version: '3.8'

services:
  # PostgreSQL Database - Production Grade
  postgres:
    image: postgres:16-alpine
    container_name: duell-postgres
    environment:
      POSTGRES_USER: duell_user
      POSTGRES_PASSWORD: duell_password
      POSTGRES_DB: duell_um_geld
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duell_user -d duell_um_geld"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis - Session Management & Caching
  redis:
    image: redis:7-alpine
    container_name: duell-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: duell-backend
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=False
      - DATABASE_URL=postgresql+asyncpg://duell_user:duell_password@postgres:5432/duell_um_geld
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend (optional for development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: duell-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
