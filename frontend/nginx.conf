server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing - serve index.html for all routes except static files
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect old background path to new videos (prevents serving stale file)
    location = /background.mp4 {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 302 /videos/login_background_169.mp4;
    }

    # Disable any API proxying - API calls are made directly from browser
    # This prevents 502 errors on frontend startup
}