# Railway Backend Configuration
# Haupt-Dockerfile für Backend mit FastAPI

[build]
builder = "dockerfile"

[build.dockerfile]
path = "Dockerfile"

[deploy]
port = 8000
startCommand = "python run.py"

[env]
PYTHONUNBUFFERED = "1"
API_HOST = "0.0.0.0"
API_PORT = "8000"
DEBUG = "false"

# Diese Variablen werden von Railway Plugins automatisch gesetzt:
# DATABASE_URL (PostgreSQL Plugin)
# REDIS_URL (Redis Plugin)
# Weitere: siehe RAILWAY_SETUP.md
